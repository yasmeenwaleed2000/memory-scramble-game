<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Scramble Game</title>
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #1e1e2f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .settings {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input, button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #4caf50;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #45a049;
    }

    .info {
      margin-bottom: 20px;
      font-size: 20px;
    }

    .game-board {
      display: grid;
      gap: 10px;
      justify-content: center;
    }

    .card {
      width: 80px;
      height: 80px;
      background: #2d2d44;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      transition: transform 0.3s;
      user-select: none;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card.flipped {
      background: white;
      color: black;
    }

    .message {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
  <script>
    const symbols = [
      '🍎','🍌','🍇','🍉','🍒','🥝','🍍','🥥',
      '🐶','🐱','🐵','🦁','🐸','🐼','🐰','🐯',
      '⚽','🏀','🏈','🎾','🎲','🎮','🚗','✈️'
    ];

    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let matches = 0;
    let totalPairs = 0;
    let timer;
    let timeLeft;

    function startGame() {
      clearInterval(timer);

      const rows = parseInt(document.getElementById('rows').value);
      const cols = parseInt(document.getElementById('cols').value);
      const gameTime = parseInt(document.getElementById('time').value);

      const totalCards = rows * cols;

      if (totalCards % 2 !== 0) {
        alert('Board size must be EVEN!');
        return;
      }

      if (totalCards / 2 > symbols.length) {
        alert('Board too large!');
        return;
      }

      matches = 0;
      totalPairs = totalCards / 2;
      firstCard = null;
      secondCard = null;
      lockBoard = false;

      document.getElementById('message').textContent = '';

      const board = document.getElementById('gameBoard');
      board.innerHTML = '';

      board.style.gridTemplateColumns = `repeat(${cols}, 80px)`;

      let selectedSymbols = symbols.slice(0, totalPairs);
      let cardsArray = [...selectedSymbols, ...selectedSymbols];

      shuffle(cardsArray);

      cardsArray.forEach(symbol => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.dataset.symbol = symbol;
        card.innerHTML = '?';

        card.addEventListener('click', flipCard);

        board.appendChild(card);
      });

      timeLeft = gameTime;
      document.getElementById('timer').textContent = timeLeft;

      timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timer);
          endGame(false);
        }
      }, 1000);
    }
    
    function flipCard() {
      if (lockBoard) return;
      if (this === firstCard) return;
      if (this.classList.contains('matched')) return;

      this.classList.add('flipped');
      this.innerHTML = this.dataset.symbol;

      if (!firstCard) {
        firstCard = this;
        return;
      }

      secondCard = this;
      lockBoard = true;

      checkMatch();
    }

    function checkMatch() {
      const isMatch = firstCard.dataset.symbol === secondCard.dataset.symbol;

      if (isMatch) {
        disableCards();
        matches++;

        if (matches === totalPairs) {
          clearInterval(timer);
          endGame(true);
        }
      } else {
        unflipCards();
      }
    }

    function disableCards() {
      firstCard.classList.add('matched');
      secondCard.classList.add('matched');

      resetBoard();
    }

    function resetBoard() {
      [firstCard, secondCard] = [null, null];
      lockBoard = false;
    }
    </script>
    
</head>
<body>
  <h1>🧠 Memory Scramble Game</h1>

  <div class="settings">
    <input type="number" id="rows" placeholder="Rows" min="2" value="4" />
    <input type="number" id="cols" placeholder="Columns" min="2" value="4" />
    <input type="number" id="time" placeholder="Time (sec)" min="10" value="60" />
    <button onclick="startGame()">Start Game</button>
  </div>
  <div class="info">
    ⏰ Time Left: <span id="timer">60</span>s
  </div>

  <div id="gameBoard" class="game-board"></div>

  <div id="message" class="message"></div>

    
</body>
</html>
