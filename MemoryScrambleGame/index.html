<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Scramble Game</title>
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #1e1e2f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .settings {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input, button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #4caf50;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #45a049;
    }

    .info {
      margin-bottom: 20px;
      font-size: 20px;
    }

    .game-board {
      display: grid;
      gap: 10px;
      justify-content: center;
    }

    .card {
      width: 80px;
      height: 80px;
      background: #2d2d44;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      transition: transform 0.3s;
      user-select: none;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card.flipped {
      background: white;
      color: black;
    }

    .message {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🧠 Memory Scramble Game</h1>

  <div class="settings">
    <input type="number" id="rows" placeholder="Rows" min="2" value="4" />
    <input type="number" id="cols" placeholder="Columns" min="2" value="4" />
    <input type="number" id="time" placeholder="Time (sec)" min="10" value="60" />
    <button onclick="startGame()">Start Game</button>
  </div>
  <div class="info">
    ⏰ Time Left: <span id="timer">60</span>s
  </div>

  <div id="gameBoard" class="game-board"></div>

  <div id="message" class="message"></div>

    
</body>
</html>
